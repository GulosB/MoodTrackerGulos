{% extends 'base.html' %}

{% block content %}
<h1 class="text-center mb-4">Как дела?</h1>
<div class="row justify-content-center">
    <div class="col-md-6">
        <form method="post" class="card p-4 shadow-sm">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.text.label_tag }}
                {{ form.text }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Сохранить запись</button>
        </form>
    </div>
</div>
{% endblock %}
